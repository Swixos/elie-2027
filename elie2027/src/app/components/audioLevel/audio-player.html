<div class="audio-level" *ngIf="src">

  <!-- Bouton play/pause -->
  <button class="icon-btn" (click)="togglePlay()" [attr.aria-label]="isPlaying ? 'Pause' : 'Play'">
    <svg *ngIf="!isPlaying" viewBox="0 0 24 24" fill="currentColor" width="15" height="15">
      <path d="M8 5v14l11-7z"/>
    </svg>
    <svg *ngIf="isPlaying" viewBox="0 0 24 24" fill="currentColor" width="15" height="15">
      <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
    </svg>
  </button>

  <!-- Label -->
  <span class="label">{{ label }}</span>

  <!-- Barre de progression -->
  <div class="progress-bar" (click)="seek($event)" role="progressbar"
       [attr.aria-valuenow]="progress" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-fill" [style.width.%]="progress"></div>
    <div class="progress-thumb" [style.left.%]="progress"></div>
  </div>

  <!-- Temps -->
  <span class="time">{{ currentTime }} / {{ duration }}</span>

  <!-- ─── Volume ─────────────────────────────────────────────────────── -->
  <div class="volume-group"
       (mouseenter)="showVolumeSlider = true"
       (mouseleave)="showVolumeSlider = false">

    <!-- Icône volume / mute -->
    <button class="icon-btn" (click)="toggleMute()" aria-label="Mute / Unmute">
      <!-- Mute -->
      <svg *ngIf="isMuted" viewBox="0 0 24 24" fill="currentColor" width="15" height="15">
        <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 18l1.73 1.73L21 18.46 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
      </svg>
      <!-- Volume bas -->
      <svg *ngIf="!isMuted && volume < 50" viewBox="0 0 24 24" fill="currentColor" width="15" height="15">
        <path d="M7 9v6h4l5 5V4l-5 5H7zm13.5 3A4.5 4.5 0 0 1 18 15.97v-7.94c1.47.83 2.5 2.4 2.5 3.97z"/>
      </svg>
      <!-- Volume haut -->
      <svg *ngIf="!isMuted && volume >= 50" viewBox="0 0 24 24" fill="currentColor" width="15" height="15">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
    </button>

    <!-- Slider volume (apparaît au hover du groupe) -->
    <div class="volume-slider-wrap" [class.visible]="showVolumeSlider">
      <input
        type="range"
        class="volume-slider"
        min="0"
        max="100"
        step="1"
        [value]="volume"
        (input)="setVolume($event)"
        aria-label="Volume"
      />
      <span class="volume-value">{{ volume }}%</span>
    </div>
  </div>

  <!-- Élément audio natif (caché) -->
  <audio
    #audioRef
    [src]="src"
    (timeupdate)="onTimeUpdate()"
    (loadedmetadata)="onLoadedMetadata()"
    (play)="onPlay()"
    (pause)="onPause()"
    (ended)="onEnded()"
  ></audio>
</div>
