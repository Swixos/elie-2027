<section class="hero">
  <!-- Animated background -->
  <div class="hero-bg">
    <div class="tricolor-stripe blue"></div>
    <div class="tricolor-stripe white"></div>
    <div class="tricolor-stripe red"></div>
    <div class="overlay"></div>
  </div>

  <!-- Floating particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="hero-content">
    <div class="hero-badge">
      <span class="badge-dot"></span>
      Élection Présidentielle 2027
    </div>

    <h1 class="hero-title">
      <span class="title-line">ELIE</span>
      <span class="title-accent">FOR</span>
      <span class="title-line">PRÉSIDENT</span>
    </h1>

    <p class="hero-slogan">Dehors les autres</p>

    <div class="hero-carousel">
      <button class="carousel-arrow prev" (click)="prev()" aria-label="Image précédente">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>

      <div class="carousel-track">
        @for (slide of slides; track slide.src) {
          <div class="carousel-slide" [class.active]="$index === currentSlide()">
            <img [src]="slide.src" [alt]="slide.alt" />
          </div>
        }
      </div>

      <button class="carousel-arrow next" (click)="next()" aria-label="Image suivante">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>

      <div class="carousel-dots">
        @for (slide of slides; track slide.src) {
          <button class="dot" [class.active]="$index === currentSlide()" (click)="goTo($index)" [attr.aria-label]="'Image ' + ($index + 1)"></button>
        }
      </div>
    </div>

    <div class="hero-actions">
      <a href="#programme" class="btn btn-primary">Découvrir le programme</a>
      <a href="#contact" class="btn btn-secondary">Nous rejoindre</a>
    </div>

    <div class="hero-stats">
      <div class="stat">
        <span class="stat-number">2027</span>
        <span class="stat-label">L'année du changement</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-number">100%</span>
        <span class="stat-label">Engagement</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-number">1</span>
        <span class="stat-label">Seul candidat</span>
      </div>
    </div>
  </div>

  <div class="scroll-indicator">
    <div class="mouse">
      <div class="wheel"></div>
    </div>
    <span>Scroll</span>
  </div>
</section>
